services:
  postgres:
    image: postgres:16-alpine
    container_name: merkamail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: merkamail
      POSTGRES_USER: merka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-merkapass123}
    volumes:
      - merkamail-postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - merkamail-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merka -d merkamail"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: merkamail-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - merkamail-data:/app/backend/data
    networks:
      - dokploy-network
      - merkamail-internal
    labels:
      - "traefik.enable=false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: merkamail-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - merkamail-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.merkamail.rule=Host(`merka-mail-screper-merkamailscreper-u7ea-048b55-153-92-222-204.traefik.me`)"
      - "traefik.http.routers.merkamail.entrypoints=websecure"
      - "traefik.http.routers.merkamail.tls.certresolver=letsencrypt"
      - "traefik.http.services.merkamail.loadbalancer.server.port=80"
      - "traefik.http.routers.merkamail-http.rule=Host(`merka-mail-screper-merkamailscreper-u7ea-048b55-153-92-222-204.traefik.me`)"
      - "traefik.http.routers.merkamail-http.entrypoints=web"
      - "traefik.http.routers.merkamail-http.middlewares=merkamail-https"
      - "traefik.http.middlewares.merkamail-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.merkamail-https.redirectscheme.permanent=true"

volumes:
  merkamail-postgres:
  merkamail-data:

networks:
  dokploy-network:
    external: true
  merkamail-internal:
    driver: bridge
